services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: aibox-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aibox
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - aibox-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama (for AI model)
  ollama:
    image: ollama/ollama:latest
    container_name: aibox-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - aibox-network

  # Backend Spring Boot
  backend:
    build:
      context: ./BackEnd/aiSpprin/demo
      dockerfile: Dockerfile
    container_name: aibox-backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: aibox
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: mySecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm
      JWT_EXPIRATION_MS: 86400000
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: gemma2:2b
      FRONTEND_URL: http://localhost:4200
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      SUPER_ADMIN_EMAIL_DOMAINS: motivitylabs.com
      SUPER_ADMIN_EMAILS: pool99owner@gmail.com
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - aibox-network

  # Frontend Angular
  frontend:
    build:
      context: ./FrontEnd/imageGenProj
      dockerfile: Dockerfile
    container_name: aibox-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - aibox-network

  # Prometheus for monitoring
#  prometheus:
#    image: prom/prometheus:latest
#    container_name: aibox-prometheus
#    ports:
#      - "9090:9090"
#    volumes:
#      - ./prometheus.yml:/etc/prometheus/prometheus.yml
#    networks:
#      - aibox-network

  # Grafana for visualization
#  grafana:
#    image: grafana/grafana:latest
#    container_name: aibox-grafana
#    ports:
#      - "3000:3000"
#    environment:
#      GF_SECURITY_ADMIN_PASSWORD: admin
#      GF_USERS_ALLOW_SIGN_UP: "false"
#    volumes:
#      - grafana_data:/var/lib/grafana
#    networks:
#      - aibox-network

volumes:
  mysql_data:
  ollama_data:
#  grafana_data:

