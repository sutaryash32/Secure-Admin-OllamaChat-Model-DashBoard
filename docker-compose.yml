version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: aibox-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aibox
      MYSQL_USER: aibox
      MYSQL_PASSWORD: aibox123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - aibox-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama (for AI model)
  ollama:
    image: ollama/ollama:latest
    container_name: aibox-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - aibox-network

  # Backend Spring Boot
  backend:
    build:
      context: ./BackEnd/aiSpprin/demo
      dockerfile: Dockerfile
    container_name: aibox-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_R2DBC_URL: r2dbc:mysql://mysql:3306/aibox
      SPRING_R2DBC_USERNAME: root
      SPRING_R2DBC_PASSWORD: root
      SPRING_JWT_SECRET: mySecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm
      SPRING_JWT_EXPIRATION: 86400000
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - aibox-network

  # Frontend Angular
  frontend:
    build:
      context: ./FrontEnd/imageGenProj
      dockerfile: Dockerfile
    container_name: aibox-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - aibox-network

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: aibox-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - aibox-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: aibox-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - aibox-network

volumes:
  mysql_data:
  ollama_data:
  grafana_data:

networks:
  aibox-network:
    driver: bridge
