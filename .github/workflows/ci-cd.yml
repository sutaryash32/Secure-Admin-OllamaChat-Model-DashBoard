name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Backend Tests and Build
  backend:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles '**/pom.xml' }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build Backend
        working-directory: ./BackEnd/aiSpprin/demo
        run: mvn clean package -DskipTests

      - name: Build Docker image (backend)
        working-directory: ./BackEnd/aiSpprin/demo
        run: |
          docker build -t backend:latest .

  # Frontend Tests and Build
  frontend:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: FrontEnd/imageGenProj/package-lock.json

      - name: Install Dependencies
        working-directory: ./FrontEnd/imageGenProj
        run: npm install

      - name: Run Tests
        working-directory: ./FrontEnd/imageGenProj
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build Frontend
        working-directory: ./FrontEnd/imageGenProj
        run: npm run build

      - name: Build Docker image (frontend)
        working-directory: ./FrontEnd/imageGenProj
        run: |
          docker build -t frontend:latest .

  # Docker Push (only on main branch)
  docker:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./BackEnd/aiSpprin/demo
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./FrontEnd/imageGenProj
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
          labels: ${{ steps.meta.outputs.labels }}

  # Deploy (placeholder for future implementation)
  deploy:
    needs: [docker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy notification
        run: |
          echo "Deployment would be triggered here"
          echo "Configure your deployment target (AWS, GCP, Kubernetes, etc.)"
