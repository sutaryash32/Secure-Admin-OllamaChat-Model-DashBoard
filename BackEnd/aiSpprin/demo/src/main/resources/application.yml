server:
  port: 8080

spring:
  application:
    name: ai-chat-service

  datasource:
    url: jdbc:mysql://localhost:3307/aibox?useUnicode=true&characterEncoding=utf8&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jwt:
    secret: mySecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm
    expiration: 86400000


  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: mistral:7b-instruct
          num-predict: 150
          num-ctx: 512
          temperature: 0.7
          top-k: 20
          top-p: 0.9

logging:
  level:
    root: INFO
    com.ai.demo: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true