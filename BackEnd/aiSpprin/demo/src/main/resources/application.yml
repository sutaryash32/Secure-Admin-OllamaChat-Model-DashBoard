server:
  port: ${APP_PORT:8080}

spring:
  application:
    name: askai-backend

  # ── Database (JPA / Hibernate) ────────────────────────────
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:aibox}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update        # use 'validate' in production after schema is stable
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # ── Spring AI / Ollama ────────────────────────────────────
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:mistral:7b-instruct}
          num-predict: 150
          num-ctx: 512
          temperature: 0.7

# ── App-specific settings ──────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:mySecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24h

# ── Actuator / Prometheus ──────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# ── Logging ────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.askai: DEBUG
    org.springframework.security: WARN   # reduce noise; set DEBUG to troubleshoot auth
  pattern:
    console: "%d{HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"