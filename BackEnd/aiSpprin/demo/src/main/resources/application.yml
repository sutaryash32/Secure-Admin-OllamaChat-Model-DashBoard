server:
  port: ${APP_PORT:8080}

spring:
  application:
    name: askai-backend

  # ── Database (JPA / Hibernate) ────────────────────────────
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:aibox}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update        # use 'validate' in production after schema is stable
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # ── OAuth2 Google Login ───────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: 183781504942-bkeaqdp7i1qlk3h4iendge0i0j406ua3.apps.googleusercontent.com
            client-secret: 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
            scope: openid, profile, email
            redirect-uri: "http://localhost:8080/login/oauth2/code/google"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

  # ── Spring AI / Ollama ────────────────────────────────────
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:mistral}   # change to whichever model you pulled
          num-predict: 150
          num-ctx: 512
          temperature: 0.7


# ── App-specific settings ──────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:mySecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  frontend:
    url: ${FRONTEND_URL:http://localhost:4200}
  super-admin:
    email-domains: ${SUPER_ADMIN_EMAIL_DOMAINS:motivitylabs.com}

# ── Actuator / Prometheus ──────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# ── Logging ────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.askai: DEBUG
    org.springframework.security: WARN   # reduce noise; set DEBUG to troubleshoot auth
  pattern:
    console: "%d{HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"