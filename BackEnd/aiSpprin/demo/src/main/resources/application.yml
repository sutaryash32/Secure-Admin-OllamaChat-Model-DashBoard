server:
  port: 8080

spring:
  application:
    name: ai-chat-service

  # JPA/Hibernate Configuration
  datasource:
    url: jdbc:mysql://localhost:3307/aibox?useUnicode=true&characterEncoding=utf8&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # JWT Configuration
  jwt:
    secret: mySecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm
    expiration: 86400000  # 24 hours in milliseconds

  # OAuth2 Resource Server
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080
          jwk-set-uri: http://localhost:8080/.well-known/jwks.json

  # Spring AI Ollama Configuration
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: mistral:7b-instruct
          num-predict: 150
          num-ctx: 512
          temperature: 0.7
          top-k: 20
          top-p: 0.9

# Logging
logging:
  level:
    root: INFO
    com.ai.demo: DEBUG
    org.springframework.security: DEBUG

# Management endpoints for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
