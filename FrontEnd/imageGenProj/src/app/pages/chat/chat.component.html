<div class="chat-container">

  <!-- Page header -->
  <div class="page-header">
    <span class="header-icon">🤖</span>
    <span class="header-title">AI Chat</span>
  </div>

  <!-- Messages -->
  <div class="message-container">
    <div *ngFor="let m of messageArray" [ngClass]="m.isUser ? 'user' : 'bot'">
      <p>{{ m.text }}</p>
      <p *ngIf="!m.text && !m.isUser" class="thinking-dots">⬤⬤⬤</p>
    </div>
    <div #scrollAnchor></div>
  </div>

  <!-- Input area -->
  <textarea
    [(ngModel)]="inputTextPrompt"
    (keydown)="onKeyDown($event)"
    [disabled]="isStreaming"
    class="chat-input"
    rows="3"
    placeholder="🤖 Type your message here...">
  </textarea>

  <div class="button-row">
    <button class="chat-button" (click)="askClicked()" [disabled]="isStreaming || !inputTextPrompt.trim()">
      {{ isStreaming ? '🤖 Thinking...' : '🚀 Ask' }}
    </button>

    <button class="stop-button" (click)="stopStreaming()" *ngIf="isStreaming">
      ⏹ Stop
    </button>
  </div>

</div>
