<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="login-avatar">🤖</div>
      <h1>Welcome to AskAI</h1>
      <p>Your futuristic AI companion</p>
    </div>

    <div class="login-body">
      <button class="google-login-btn" (click)="loginWithGoogle()" [disabled]="isLoading">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo" class="google-icon">
        <span>{{ isLoading ? '🚀 Launching...' : '🔐 Continue with Google' }}</span>
      </button>

      <div class="error-message" *ngIf="errorMessage">
        ⚠️ {{ errorMessage }}
      </div>
    </div>

    <div class="login-footer">
      <p>By signing in, you agree to our Terms of Service and Privacy Policy</p>
    </div>
  </div>
</div>
